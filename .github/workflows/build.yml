name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Calculate version
      run: |
        # Next run is expected to be 8, resulting in PATCH_VERSION=1
        PATCH_VERSION=$(( ${{ github.run_number }} - 7 ))
        echo "PATCH_VERSION=$PATCH_VERSION" >> $GITHUB_ENV

    - name: Build with Gradle
      run: ./gradlew assembleDebug -PpatchVersion=${{ env.PATCH_VERSION }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: 1.0.${{ env.PATCH_VERSION }}
        name: Release 1.0.${{ env.PATCH_VERSION }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
